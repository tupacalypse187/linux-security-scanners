name: Build & Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-clamav:
    name: ClamAV ${{ matrix.os-label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-dir: almalinux9
            os-label: AlmaLinux 9
            image-tag: almalinux9-clamav
          - os-dir: amazonlinux2
            os-label: Amazon Linux 2
            image-tag: amazonlinux2-clamav
          - os-dir: amazonlinux2023
            os-label: Amazon Linux 2023
            image-tag: amazonlinux2023-clamav
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t ${{ matrix.image-tag }}:latest -f clamav/${{ matrix.os-dir }}/Dockerfile .

      - name: Verify ClamAV version
        run: docker run --rm ${{ matrix.image-tag }}:latest clamscan --version

      - name: Smoke test — scan with JSON output
        run: |
          docker run --rm ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/clamav
            clamscan /etc/hostname /etc/hosts /etc/passwd /etc/resolv.conf | \
              python3 /usr/local/bin/clamscan-to-json.py
          '

      - name: Smoke test — JSONL append and validation
        run: |
          docker run --rm -v $PWD/scripts:/scripts ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/clamav
            clamscan /etc/hostname | python3 /usr/local/bin/clamscan-to-json.py
            clamscan /etc/hosts /etc/passwd | python3 /usr/local/bin/clamscan-to-json.py
            python3 /scripts/validate-clamav-jsonl.py /var/log/clamav/clamscan.jsonl 2
          '

      - name: Generate sample results
        run: |
          mkdir -p /tmp/results
          docker run --rm -v /tmp/results:/out ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/clamav
            {
              echo "========================================"
              echo "clamscan WITH summary (default)"
              echo "Image: ${{ matrix.image-tag }}:latest"
              echo "Date: $(date -u +%Y-%m-%d)"
              echo "========================================"
              echo ""
              clamscan /etc/hostname /etc/hosts /etc/passwd /etc/resolv.conf
              echo ""
              echo "========================================"
              echo "clamscan WITHOUT summary (--no-summary)"
              echo "========================================"
              echo ""
              clamscan --no-summary /etc/hostname /etc/hosts /etc/passwd /etc/resolv.conf
            } > /out/clamscan.log
            {
              echo "=== WITH summary (1 JSON line) ==="
              clamscan /etc/hostname /etc/hosts /etc/passwd /etc/resolv.conf | python3 /usr/local/bin/clamscan-to-json.py
              echo ""
              echo "=== WITHOUT summary --no-summary (1 JSON line) ==="
              clamscan --no-summary /etc/hostname /etc/hosts /etc/passwd /etc/resolv.conf | python3 /usr/local/bin/clamscan-to-json.py
            } > /out/clamscan.json
          '

      - name: Upload sample results
        uses: actions/upload-artifact@v5
        with:
          name: clamav-${{ matrix.os-dir }}-results
          path: /tmp/results/
          retention-days: 30

  build-aide:
    name: AIDE ${{ matrix.os-label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-dir: almalinux9
            os-label: AlmaLinux 9
            image-tag: almalinux9-aide
          - os-dir: amazonlinux2
            os-label: Amazon Linux 2
            image-tag: amazonlinux2-aide
          - os-dir: amazonlinux2023
            os-label: Amazon Linux 2023
            image-tag: amazonlinux2023-aide
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t ${{ matrix.image-tag }}:latest -f aide/${{ matrix.os-dir }}/Dockerfile .

      - name: Verify AIDE version
        run: docker run --rm ${{ matrix.image-tag }}:latest aide --version

      - name: Smoke test — check with JSON output
        run: |
          docker run --rm ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/aide
            aide -C 2>&1 | python3 /usr/local/bin/aide-to-json.py
          '

      - name: Smoke test — JSONL append and change detection
        run: |
          docker run --rm -v $PWD/scripts:/scripts ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/aide
            aide -C 2>&1 | python3 /usr/local/bin/aide-to-json.py
            echo "tampered" > /tmp/ci-test-hack
            aide -C 2>&1 | python3 /usr/local/bin/aide-to-json.py
            python3 /scripts/validate-aide-jsonl.py /var/log/aide/aide.jsonl 2
          '

      - name: Generate sample results
        run: |
          mkdir -p /tmp/results
          docker run --rm -v /tmp/results:/out ${{ matrix.image-tag }}:latest bash -c '
            mkdir -p /var/log/aide
            {
              echo "========================================"
              echo "AIDE check — ${{ matrix.os-label }}"
              echo "Image: ${{ matrix.image-tag }}:latest"
              echo "Date: $(date -u +%Y-%m-%d)"
              echo "========================================"
              echo ""
              echo "=== CLEAN CHECK ==="
              aide -C 2>&1
              echo ""
              echo "=== CHECK WITH TAMPERED FILE ==="
              echo "tampered" > /tmp/ci-test-hack
              chmod 777 /etc/resolv.conf
              aide -C 2>&1
            } > /out/aide.log
            {
              echo "=== CLEAN CHECK (1 JSON line) ==="
              aide -C 2>&1 | python3 /usr/local/bin/aide-to-json.py
              echo ""
              echo "=== TAMPERED CHECK (1 JSON line) ==="
              echo "tampered" > /tmp/ci-test-hack
              chmod 777 /etc/resolv.conf
              aide -C 2>&1 | python3 /usr/local/bin/aide-to-json.py
            } > /out/aide.json
          '

      - name: Upload sample results
        uses: actions/upload-artifact@v5
        with:
          name: aide-${{ matrix.os-dir }}-results
          path: /tmp/results/
          retention-days: 30

  verify-aide-native-json-al2023:
    name: AIDE Amazon Linux 2023 - native report_format=json
    runs-on: ubuntu-latest
    needs: build-aide
    steps:
      - uses: actions/checkout@v5

      - name: Build AL2023 AIDE image
        run: docker build -t amazonlinux2023-aide:latest -f aide/amazonlinux2023/Dockerfile .

      - name: Native JSON via CLI -B override (must produce valid JSON)
        run: |
          docker run --rm amazonlinux2023-aide:latest bash -c '
            echo "tampered" >> /etc/passwd
            aide --check -B "report_format=json" 2>/dev/null | python3 -c "import sys,json; json.loads(sys.stdin.read())"
          '

      - name: Config ordering reproducer demo script runs cleanly
        run: docker run --rm amazonlinux2023-aide:latest bash /usr/local/bin/native-json-demo.sh
